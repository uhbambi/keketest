name: Draw Ocean Map

on:
  workflow_dispatch:

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout utils repo
        uses: actions/checkout@v3
        with:
          repository: uhbambi/Tetetetetst
          path: utils

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: utils/ocean-tiles
        run: npm install

      - name: Extract ocean tiles
        working-directory: utils/ocean-tiles
        run: tar -xf ocean.tar.xz

      - name: Draw ocean
        working-directory: utils/ocean-tiles
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node drawOcean.js
